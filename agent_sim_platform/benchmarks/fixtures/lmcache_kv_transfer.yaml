name: lmcache_kv_transfer
domain: serving
source: "LMCache: An Efficient KV Cache Layer for Enterprise-Scale LLM Inference"
source_url: "https://arxiv.org/abs/2510.09665"
hardware_names:
  - H100-SXM5
model_name: 70B-Dense
algorithm_name: dense
config:
  arrival_rate_per_sec: 2.0
  arrival_distribution: poisson
  target_ttft_ms: 2000.0
  target_tpot_ms: 50.0
  max_batch_size: 8
  max_queue_len: 16
  prefill_decode_disaggregation: true
  pd_config:
    enabled: true
    prefill_gpu_count: 4
    decode_gpu_count: 4
    kv_transfer_bw_gb_s: 400.0
    kv_transfer_latency_us: 5.0
    transfer_chunk_size_mb: 256.0
    async_prefetch: true
  request_length_mean: 16384
  request_length_std: 4096
  output_length_mean: 1024
  output_length_std: 512
  simulation_duration_seconds: 60.0
  decode_overhead_ms: 3.39
observed_metrics:
  throughput_req_per_sec: 2.0
  throughput_tok_per_sec: 35000.0
  ttft_p50_ms: 300.0
  ttft_p99_ms: 700.0
  tpot_p50_ms: 6.0
  tpot_p99_ms: 12.0
  requests_dropped: 0
tolerance:
  mape: 0.40
  throughput_mape: 0.40
  latency_mape: 0.50
notes: >
  LMCache reports ~400 Gbps effective KV bandwidth vs ~88 Gbps for vLLM native
  CPU offloading. TTFT reduction 1.53-1.84x, ITL reduction 1.12-1.66x.
  Fixture models long-context PD disaggregation with async prefetch.
